apiVersion: v1
kind: Secret
metadata:
  name: nexus-hr-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET:          {{ .Values.secrets.jwtSecret          | b64enc | quote }}
  DB_PASS:             {{ .Values.secrets.dbPass             | b64enc | quote }}
  POSTGRES_PASSWORD:   {{ .Values.secrets.postgresPassword   | b64enc | quote }}
  SMTP_USER:           {{ .Values.secrets.smtpUser           | b64enc | quote }}
  SMTP_PASS:           {{ .Values.secrets.smtpPass           | b64enc | quote }}
