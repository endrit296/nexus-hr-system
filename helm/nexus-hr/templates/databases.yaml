# ── MongoDB ───────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
    app: mongo
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      {{- include "nexus-hr.selectorLabels" "mongo" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-hr.selectorLabels" "mongo" | nindent 8 }}
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            {{- toYaml .Values.dbResources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.persistence.mongo.storageClass }}
        storageClassName: {{ .Values.persistence.mongo.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.mongo.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "nexus-hr.selectorLabels" "mongo" | nindent 4 }}
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None
---
# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "nexus-hr.selectorLabels" "postgres" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-hr.selectorLabels" "postgres" | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: nexus-hr-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: nexus-hr-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexus-hr-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.dbResources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.persistence.postgres.storageClass }}
        storageClassName: {{ .Values.persistence.postgres.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.postgres.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "nexus-hr.selectorLabels" "postgres" | nindent 4 }}
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
# ── Redis ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "nexus-hr.selectorLabels" "redis" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-hr.selectorLabels" "redis" | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "nexus-hr.selectorLabels" "redis" | nindent 4 }}
  ports:
    - port: 6379
      targetPort: 6379
---
# ── RabbitMQ ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "nexus-hr.selectorLabels" "rabbitmq" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-hr.selectorLabels" "rabbitmq" | nindent 8 }}
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          resources:
            {{- toYaml .Values.dbResources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "nexus-hr.selectorLabels" "rabbitmq" | nindent 4 }}
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
