# ── Auth Service ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
    app: auth-service
spec:
  replicas: {{ .Values.replicaCount.authService }}
  selector:
    matchLabels:
      {{- include "nexus-hr.selectorLabels" "auth-service" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-hr.selectorLabels" "auth-service" | nindent 8 }}
    spec:
      containers:
        - name: auth-service
          image: {{ include "nexus-hr.image" (dict "service" "auth-service" "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: nexus-hr-config
          env:
            - name: PORT
              value: "3001"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: nexus-hr-config
                  key: MONGO_URI_AUTH
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-hr-secrets
                  key: JWT_SECRET
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: nexus-hr-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: nexus-hr-secrets
                  key: SMTP_PASS
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "nexus-hr.selectorLabels" "auth-service" | nindent 4 }}
  ports:
    - port: 3001
      targetPort: 3001
---
# ── Employee Service ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
    app: employee-service
spec:
  replicas: {{ .Values.replicaCount.employeeService }}
  selector:
    matchLabels:
      {{- include "nexus-hr.selectorLabels" "employee-service" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-hr.selectorLabels" "employee-service" | nindent 8 }}
    spec:
      containers:
        - name: employee-service
          image: {{ include "nexus-hr.image" (dict "service" "employee-service" "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3002
              name: http
            - containerPort: 50051
              name: grpc
          envFrom:
            - configMapRef:
                name: nexus-hr-config
          env:
            - name: PORT
              value: "3002"
            - name: GRPC_PORT
              value: "50051"
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: nexus-hr-secrets
                  key: DB_PASS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-hr-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: employee-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "nexus-hr.selectorLabels" "employee-service" | nindent 4 }}
  ports:
    - name: http
      port: 3002
      targetPort: 3002
    - name: grpc
      port: 50051
      targetPort: 50051
---
