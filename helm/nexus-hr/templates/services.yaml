# ── API Gateway ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
    app: api-gateway
spec:
  replicas: {{ .Values.replicaCount.apiGateway }}
  selector:
    matchLabels:
      {{- include "nexus-hr.selectorLabels" "api-gateway" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-hr.selectorLabels" "api-gateway" | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "8080"
    spec:
      containers:
        - name: api-gateway
          image: {{ include "nexus-hr.image" (dict "service" "api-gateway" "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nexus-hr-config
          env:
            - name: PORT
              value: "8080"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-hr-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "nexus-hr.selectorLabels" "api-gateway" | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
---
# ── Frontend ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
    app: frontend
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      {{- include "nexus-hr.selectorLabels" "frontend" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-hr.selectorLabels" "frontend" | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: {{ include "nexus-hr.image" (dict "service" "frontend" "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-hr.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "nexus-hr.selectorLabels" "frontend" | nindent 4 }}
  ports:
    - port: 80
      targetPort: 80
