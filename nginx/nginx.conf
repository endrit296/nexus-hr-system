# Use Docker's internal DNS resolver — re-resolves hostnames dynamically
# so Nginx never caches a stale container IP after a restart.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name localhost;

    # API requests — proxied to the API Gateway (load balanced)
    # Variables force per-request DNS resolution via the resolver above.
    location /api/ {
        set $upstream_api http://api-gateway:8080;
        proxy_pass         $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else — served by the React frontend
    location / {
        set $upstream_frontend http://frontend:80;
        proxy_pass         $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
