# NOTE: Replace all <base64-encoded-value> placeholders before applying.
# Generate with:  echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: nexus-hr-secrets
  namespace: nexus-hr
type: Opaque
data:
  JWT_SECRET:          <base64-encoded-jwt-secret>
  DB_PASS:             <base64-encoded-db-password>
  POSTGRES_PASSWORD:   <base64-encoded-db-password>
  SMTP_USER:           <base64-encoded-smtp-user>
  SMTP_PASS:           <base64-encoded-smtp-pass>
