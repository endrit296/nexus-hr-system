name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nexus-hr

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint & Unit Tests (runs all three services in parallel)
  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, employee-service, time-tracking-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Run unit tests with coverage
        run: npm run test:coverage -- --ci
        working-directory: ${{ matrix.service }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — Build Docker images
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all service images
        run: docker compose build --parallel

      - name: Export images for integration test job
        run: |
          docker save $(docker compose config --images | tr '\n' ' ') \
            -o /tmp/nexus-images.tar
        continue-on-error: true

      - name: Cache Docker images
        uses: actions/cache@v4
        with:
          path: /tmp/nexus-images.tar
          key: docker-images-${{ github.sha }}

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — Integration Tests (Newman against live Docker Compose stack)
  # ────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Newman)
    runs-on: ubuntu-latest
    needs: build
    env:
      DB_PASS: nexus
      POSTGRES_PASSWORD: nexus
      JWT_SECRET: nexus_ci_secret
    steps:
      - uses: actions/checkout@v4

      - name: Restore Docker image cache
        uses: actions/cache@v4
        with:
          path: /tmp/nexus-images.tar
          key: docker-images-${{ github.sha }}

      - name: Load Docker images
        run: docker load -i /tmp/nexus-images.tar || docker compose build --parallel

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for API gateway to be ready
        run: |
          echo "Waiting for services to start..."
          timeout 90 bash -c \
            'until curl -sf http://localhost/health; do sleep 3; done'
          echo "Stack is ready."

      - name: Seed admin user for integration tests
        run: node tests/seed.js
        env:
          MONGO_URI: mongodb://localhost:27017/nexus_auth

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman integration tests
        run: node tests/integration/run-newman.js

      - name: Upload Newman results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-results
          path: tests/integration/results.json

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4 — Push to GitHub Container Registry (main branch only)
  # ────────────────────────────────────────────────────────────────────────────
  push:
    name: Push Images to Registry
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api-gateway:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api-gateway:latest

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth-service:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth-service:latest

      - name: Build and push employee-service
        uses: docker/build-push-action@v5
        with:
          context: ./employee-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-employee-service:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-employee-service:latest

      - name: Build and push time-tracking-service
        uses: docker/build-push-action@v5
        with:
          context: ./time-tracking-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-time-tracking-service:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-time-tracking-service:latest

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5 — Deploy to staging with Helm (main branch only)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging (K8s / Helm)
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
        env:
          KUBECONFIG: /tmp/kubeconfig

      - name: Deploy with Helm
        run: |
          helm upgrade --install nexus-hr ./helm/nexus-hr \
            --namespace nexus-hr \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set image.registry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }} \
            --wait --timeout 5m
        env:
          KUBECONFIG: /tmp/kubeconfig
